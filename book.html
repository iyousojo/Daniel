<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="book.css">
    <title>Books | Academic Digital Resources</title>
    <style>
        .book-card-img { height: 250px; object-fit: cover; }
        .transition-hover:hover { transform: translateY(-5px); transition: 0.3s; }
        section { padding: 60px 0; }
        .loader { display: block; margin: 20px auto; }
    </style>
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg bg-white sticky-top shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-primary" href="index.html">Academic Digital Resources</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarToggler">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarToggler">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="book.html">Books</a></li>
                </ul>
                <div class="d-flex">
                    <input class="form-control me-2" type="search" id="bookSearch" placeholder="Search title or author..." onkeyup="searchBooks()">
                </div>
            </div>
        </div>
    </nav>

    <header class="bg-primary text-white text-center py-5">
        <h1 class="fw-bold">Digital Library</h1>
        <p>Select your level to explore academic resources</p>
        <div class="mt-3">
            <a href="#section-100" class="btn btn-outline-light m-1">100L</a>
            <a href="#section-200" class="btn btn-outline-light m-1">200L</a>
            <a href="#section-300" class="btn btn-outline-light m-1">300L</a>
            <a href="#section-400" class="btn btn-outline-light m-1">400L</a>
        </div>
    </header>

    <div class="container mt-5">
        <section id="section-100">
            <h2 class="fw-bold text-primary border-bottom pb-2 mb-4">100 Level Resources</h2>
            <div class="row g-4" id="container-100">
                <div class="text-center"><div class="spinner-border text-primary"></div></div>
            </div>
        </section>

        <section id="section-200">
            <h2 class="fw-bold text-primary border-bottom pb-2 mb-4">200 Level Resources</h2>
            <div class="row g-4" id="container-200">
                <div class="text-center"><div class="spinner-border text-primary"></div></div>
            </div>
        </section>

        <section id="section-300">
            <h2 class="fw-bold text-primary border-bottom pb-2 mb-4">300 Level Resources</h2>
            <div class="row g-4" id="container-300">
                <div class="text-center"><div class="spinner-border text-primary"></div></div>
            </div>
        </section>

        <section id="section-400">
            <h2 class="fw-bold text-primary border-bottom pb-2 mb-4">400 Level Resources</h2>
            <div class="row g-4" id="container-400">
                <div class="text-center"><div class="spinner-border text-primary"></div></div>
            </div>
        </section>
    </div>

    <footer class="bg-white border-top py-4 mt-5 text-center">
        <p class="text-muted mb-0">© 2026 Academic Digital Resources. All rights reserved.</p>
    </footer>

   <script>
    const API_URL = "https://bookshop-api-jbl4.onrender.com/api";
    let allBooks = [];

    document.addEventListener('DOMContentLoaded', fetchAllBooks);

    async function fetchAllBooks() {
        try {
            const response = await fetch(`${API_URL}/books`);
            if (!response.ok) throw new Error("Server response was not ok");
            allBooks = await response.json();
            renderBooks(allBooks);
        } catch (error) {
            console.error("Error:", error);
            // Show error in containers instead of just an alert
            document.querySelectorAll('[id^="container-"]').forEach(el => {
                el.innerHTML = '<div class="text-danger text-center">Failed to load books. Please refresh.</div>';
            });
        }
    }

    function renderBooks(booksToDisplay) {
        // FIX: The keys here MUST match the values from your database (e.g., "100L")
        const containers = {
            "100L": document.getElementById('container-100'),
            "200L": document.getElementById('container-200'),
            "300L": document.getElementById('container-300'),
            "400L": document.getElementById('container-400')
        };

        // Clear all containers
        Object.values(containers).forEach(div => { if(div) div.innerHTML = ''; });

        booksToDisplay.forEach(book => {
            const cardHTML = `
                <div class="col-6 col-md-4 col-lg-3">
                    <div class="card h-100 shadow-sm transition-hover border-0">
                        <img src="${book.imageUrl || 'https://via.placeholder.com/300x400?text=Book+Cover'}"
                             class="card-img-top book-card-img" alt="${book.title}"
                             onerror="this.src='https://via.placeholder.com/300x400?text=No+Cover'">
                        <div class="card-body d-flex flex-column">
                            <h6 class="text-muted small mb-1">${book.author}</h6>
                            <h5 class="card-title h6 fw-bold mb-2">${book.title}</h5>
                            <div class="mt-auto">
                                <p class="fw-bold text-primary mb-2">₦${Number(book.price).toLocaleString()}</p>
                                <a href="book-details.html?id=${book._id}" class="btn btn-sm btn-primary w-100">Get Book</a>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // This level variable will be "100L", "200L", etc.
            const level = String(book.level);
            
            // Now this check will succeed because containers["100L"] exists
            if (containers[level]) {
                containers[level].innerHTML += cardHTML;
            }
        });

        // Show empty state for sections with no matching books
        Object.keys(containers).forEach(key => {
            if (containers[key] && containers[key].innerHTML === '') {
                containers[key].innerHTML = `
                    <div class="col-12">
                        <div class="alert alert-secondary text-center">No books available for ${key} yet.</div>
                    </div>`;
            }
        });
    }

    function searchBooks() {
        const term = document.getElementById('bookSearch').value.toLowerCase();
        const filtered = allBooks.filter(b =>
            b.title.toLowerCase().includes(term) ||
            b.author.toLowerCase().includes(term)
        );
        renderBooks(filtered);
    }
</script>
</html>
