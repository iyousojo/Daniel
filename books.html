<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="book.css">
    <title>Library | Academic Digital Resources</title>
    <style>
        :root {
            --primary-color: #007bff;
        }

        .book-card-img {
            height: 280px;
            object-fit: cover;
            background-color: #f8f9fa;
            transition: transform 0.3s ease;
        }

        .card:hover .book-card-img {
            transform: scale(1.05);
        }

        .card {
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
        }

        #loading-sentinel {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
        }

        .badge-level {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 2;
        }
    </style>
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg bg-white sticky-top shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-primary" href="index.html">Academic Digital Resources</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="book.html">All Books</a></li>
                </ul>
                <div class="d-flex w-50">
                    <input class="form-control me-2 shadow-sm" type="search" id="bookSearch" placeholder="Search books..." onkeyup="handleSearch()">
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <header class="text-center mb-5">
            <h1 class="display-5 fw-bold text-dark">Our Digital Library</h1>
            <p class="text-muted">Browse through hundreds of academic resources</p>
        </header>

        <div class="row g-4" id="book-grid">
            </div>

        <div id="loading-sentinel">
            <div class="spinner-border text-primary" role="status" id="spinner">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p id="end-message" class="text-muted d-none">You've reached the end of the library.</p>
        </div>
    </div>

    <footer class="bg-primary text-white py-4">
        <div class="container text-center">
            <p class="mb-0">© 2026 Academic Digital Resources. Empowering Students.</p>
        </div>
    </footer>

    <script>
        const API_URL = "https://bookshop-api-jbl4.onrender.com/api";
        let page = 1;
        let limit = 8; // Number of books to load per scroll
        let isFetching = false;
        let hasMore = true;
        let searchTerm = "";

        document.addEventListener('DOMContentLoaded', () => {
            fetchBooks();
            window.addEventListener('scroll', handleScroll);
        });

        async function fetchBooks() {
            if (isFetching || !hasMore) return;
            
            isFetching = true;
            document.getElementById('spinner').classList.remove('d-none');

            try {
                // Note: Your API needs to support ?page= and ?limit= for true server-side infinite scroll.
                // If your API doesn't, this will fetch all and we simulate the display.
                const response = await fetch(`${API_URL}/books?page=${page}&limit=${limit}&search=${searchTerm}`);
                const books = await response.json();

                if (books.length < limit) {
                    hasMore = false;
                    document.getElementById('spinner').classList.add('d-none');
                    document.getElementById('end-message').classList.remove('d-none');
                }

                renderBooks(books);
                page++;
            } catch (error) {
                console.error("Fetch error:", error);
            } finally {
                isFetching = false;
            }
        }

        function renderBooks(books) {
            const grid = document.getElementById('book-grid');
            
            books.forEach(book => {
                const bookHTML = `
                    <div class="col-6 col-md-4 col-lg-3">
                        <div class="card h-100 border-0 shadow-sm position-relative">
                            <span class="badge bg-primary badge-level">${book.level}L</span>
                            <img src="${book.imageUrl || 'placeholder.jpg'}" 
                                 class="card-img-top book-card-img" 
                                 alt="${book.title}"
                                 onerror="this.src='https://via.placeholder.com/300x400?text=No+Cover'">
                            <div class="card-body p-3 d-flex flex-column">
                                <h6 class="card-title text-dark fw-bold mb-1" style="font-size: 0.95rem;">${book.title}</h6>
                                <p class="text-muted small mb-2">${book.author}</p>
                                <div class="mt-auto">
                                    <p class="fw-bold text-primary mb-2">₦${Number(book.price).toLocaleString()}</p>
                                    <a href="book-details.html?id=${book._id}" class="btn btn-sm btn-primary w-100">View</a>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += bookHTML;
            });
        }

        function handleScroll() {
            const { scrollTop, scrollHeight, clientHeight } = document.documentElement;
            // If user is within 100px of the bottom
            if (scrollTop + clientHeight >= scrollHeight - 100) {
                fetchBooks();
            }
        }

        function handleSearch() {
            searchTerm = document.getElementById('bookSearch').value;
            // Reset for new search
            document.getElementById('book-grid').innerHTML = '';
            page = 1;
            hasMore = true;
            document.getElementById('end-message').classList.add('d-none');
            fetchBooks();
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
