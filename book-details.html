<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>Book Details | ADR</title>
    <style>
        .book-cover {
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            object-fit: cover;
        }

        .detail-card {
            border: none;
            border-radius: 15px;
            padding: 30px;
        }

        .price-tag {
            font-size: 2rem;
            color: #198754;
            font-weight: 800;
        }

        .badge-level {
            background-color: #e7f1ff;
            color: #0d6efd;
            padding: 8px 15px;
            border-radius: 50px;
            font-weight: bold;
        }
    </style>
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg bg-white sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="index.html">Academic Digital Resources</a>
            <div class="d-flex">
                <a href="book.html" class="btn btn-outline-primary btn-sm"><i class="bi bi-arrow-left"></i> Back to Library</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div id="loading" class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2">Loading book details...</p>
        </div>

        <div id="bookContainer" class="row d-none">
            <div class="col-md-5 text-center mb-4">
                <img id="bookImg" src="" alt="Book Cover" class="book-cover">
            </div>

            <div class="col-md-7">
                <div class="card detail-card shadow-sm bg-white">
                    <span id="bookLevel" class="badge-level mb-3 d-inline-block" style="width: fit-content;"></span>
                    <h1 id="bookTitle" class="fw-extrabold mb-2 text-dark"></h1>
                    <p class="text-muted fs-5">By <span id="bookAuthor" class="fw-bold"></span></p>

                    <hr class="my-4">

                    <div class="mb-4">
                        <small class="text-uppercase text-muted fw-bold d-block mb-1">Price</small>
                        <div id="bookPrice" class="price-tag"></div>
                    </div>

                    <div class="d-grid gap-2">
                        <button id="buyBtn" onclick="handlePurchaseClick()" class="btn btn-primary btn-lg fw-bold py-3">
                            <i class="bi bi-cart-fill"></i> Buy Now
                        </button>
                        <small class="text-center text-muted"><i class="bi bi-shield-check"></i> Secure Payment via Paystack</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="emailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Email Required</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted">Please provide your email address to receive your receipt and digital access.</p>
                    <form id="emailForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Email Address</label>
                            <input type="email" id="userEmailInput" class="form-control" placeholder="example@university.edu" required>
                        </div>
                        <button type="submit" id="saveEmailBtn" class="btn btn-primary w-100 fw-bold">Save and Continue</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = "https://bookshop-api-jbl4.onrender.com/api";
        const urlParams = new URLSearchParams(window.location.search);
        const bookId = urlParams.get('id');
        let currentBook = null;

        document.addEventListener('DOMContentLoaded', () => {
            if (!bookId) {
                document.getElementById('loading').innerHTML = `
                    <div class="alert alert-warning">No book selected. Redirecting...</div>`;
                setTimeout(() => window.location.href = "book.html", 2000);
                return;
            }
            fetchBookDetails();
        });

        async function fetchBookDetails() {
            try {
                const response = await fetch(`${API_URL}/books/${bookId}`);
                if (!response.ok) throw new Error(`Server error: ${response.status}`);
                
                const result = await response.json();
                currentBook = result.book || result.data || result;

                if (!currentBook || !currentBook.title) throw new Error("Invalid book data.");

                document.getElementById('bookTitle').innerText = currentBook.title;
                document.getElementById('bookAuthor').innerText = currentBook.author;
                document.getElementById('bookPrice').innerText = `₦${Number(currentBook.price).toLocaleString()}`;
                document.getElementById('bookLevel').innerText = `${currentBook.level || 'Unknown'}L Resource`;
                document.getElementById('bookImg').src = currentBook.imageUrl || 'https://via.placeholder.com/400x500?text=No+Cover';

                document.getElementById('loading').classList.add('d-none');
                document.getElementById('bookContainer').classList.remove('d-none');
            } catch (err) {
                console.error(err);
                document.getElementById('loading').innerHTML = `<div class="alert alert-danger">Error: ${err.message}</div>`;
            }
        }

        // Logic to determine if we show the modal or go straight to payment
        function handlePurchaseClick() {
            const token = localStorage.getItem('token');
            if (!token) {
                alert("Please login to purchase this book.");
                window.location.href = "login.html";
                return;
            }

            const savedEmail = localStorage.getItem('userEmail');
            if (!savedEmail || savedEmail === "undefined" || savedEmail === "") {
                const myModal = new bootstrap.Modal(document.getElementById('emailModal'));
                myModal.show();
            } else {
                initiatePurchase(savedEmail);
            }
        }

        // Handle Email Form Submission
        document.getElementById('emailForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('userEmailInput').value;
            const token = localStorage.getItem('token');
            const saveBtn = document.getElementById('saveEmailBtn');

            saveBtn.disabled = true;
            saveBtn.innerText = "Saving...";

            try {
                const res = await fetch(`${API_URL}/users/update-profile`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ email })
                });

                if (res.ok) {
                    localStorage.setItem('userEmail', email);
                    bootstrap.Modal.getInstance(document.getElementById('emailModal')).hide();
                    initiatePurchase(email);
                } else {
                    alert("Failed to update email.");
                }
            } catch (err) {
                alert("Network error.");
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerText = "Save and Continue";
            }
        });

        async function initiatePurchase(email) {
            const btn = document.getElementById('buyBtn');
            const token = localStorage.getItem('token');

            btn.disabled = true;
            btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Processing...`;

            try {
                const response = await fetch(`${API_URL}/payments/initialize`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ 
                        bookId: bookId, 
                        email: email,
                        amount: currentBook.price 
                    })
                });

                const data = await response.json();
                if (response.ok && data.authorization_url) {
                    window.location.href = data.authorization_url;
                } else {
                    alert(data.error || "Payment initialization failed.");
                }
            } catch (err) {
                alert("Payment error. Please try again.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i class="bi bi-cart-fill"></i> Buy Now`;
            }
        }
    </script>
</body>
</html>
