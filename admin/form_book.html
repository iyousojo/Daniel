<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>Add Book | ADR Admin</title>
    <style>
        .form-container { max-width: 600px; margin: 30px auto; padding: 30px; border-radius: 15px; }
        #imagePreview { max-height: 200px; display: none; margin-top: 10px; border-radius: 8px; border: 2px dashed #ddd; }
    </style>
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg bg-white sticky-top shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-primary" href="#">Academic Digital Resources</a>
            <div class="d-flex align-items-center">
                <button class="btn btn-sm btn-outline-danger" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="form-container bg-white shadow-sm border">
            <h2 class="mb-4 text-center fw-bolder text-primary"><i class="bi bi-journal-plus"></i> Add New Book</h2>
            
            <form id="addBookForm">
                <div class="mb-3">
                    <label for="title" class="form-label fw-bold">Book Title</label>
                    <input type="text" class="form-control" id="title" required>
                </div>
                
                <div class="mb-3">
                    <label for="author" class="form-label fw-bold">Author</label>
                    <input type="text" class="form-control" id="author" required>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="price" class="form-label fw-bold">Price (₦)</label>
                        <input type="number" class="form-control" id="price" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="level" class="form-label fw-bold">Level</label>
                        <select class="form-select" id="level" required>
                            <option value="100L">100L</option>
                            <option value="200L">200L</option>
                            <option value="300L">300L</option>
                            <option value="400L">400L</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="image" class="form-label fw-bold">Cover Image</label>
                    <input type="file" class="form-control" id="image" accept="image/*" required onchange="previewFile()">
                    <div class="text-center">
                        <img src="" id="imagePreview" alt="Preview" class="img-fluid mx-auto mt-2">
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn btn-primary w-100 fw-bold py-2">
                    <span id="btnText">Upload Book to Library</span>
                    <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                </button>
            </form>
        </div>
    </div>
<script>
   const API_URL = "https://bookshop-api-jbl4.onrender.com/api/books"; // Ensure this matches your route prefix
const urlParams = new URLSearchParams(window.location.search);
const editId = urlParams.get('edit'); // Detects ?edit=ID

document.addEventListener('DOMContentLoaded', async () => {
    // If we are in EDIT mode
    if (editId) {
        document.querySelector('h2').innerHTML = '<i class="bi bi-pencil-square"></i> Edit Book Details';
        document.getElementById('btnText').innerText = "Update Book Details";
        document.getElementById('image').required = false; // Image not required when editing
        
        await prefillFormData(editId);
    }
});

// 1. FETCH AND FILL DATA
async function prefillFormData(id) {
    try {
        const response = await fetch(`${API_URL}/${id}`);
        const book = await response.json();

        if (response.ok) {
            document.getElementById('title').value = book.title;
            document.getElementById('author').value = book.author;
            document.getElementById('price').value = book.price;
            document.getElementById('level').value = book.level;
            
            // Show current image preview
            if (book.imageUrl) {
                const preview = document.getElementById('imagePreview');
                preview.src = book.imageUrl;
                preview.style.display = 'block';
            }
        }
    } catch (err) {
        console.error("Error prefilling form:", err);
    }
}

// 2. PREVIEW FILE LOGIC
function previewFile() {
    const preview = document.getElementById('imagePreview');
    const fileInput = document.getElementById('image');
    const selectedFile = fileInput.files[0];

    if (selectedFile) {
        const reader = new FileReader();
        reader.onloadend = () => {
            preview.src = reader.result;
            preview.style.display = 'block';
        }
        reader.readAsDataURL(selectedFile);
    }
}

// 3. SUBMIT LOGIC (HANDLES BOTH ADD & EDIT)
document.getElementById('addBookForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const token = localStorage.getItem('token');
    const btn = document.getElementById('submitBtn');
    const spinner = document.getElementById('btnSpinner');
    const btnText = document.getElementById('btnText');
    const fileInput = document.getElementById('image');

    btn.disabled = true;
    spinner.classList.remove('d-none');
    btnText.innerText = editId ? "Updating..." : "Uploading...";

    const formData = new FormData();
    formData.append('title', document.getElementById('title').value);
    formData.append('author', document.getElementById('author').value);
    formData.append('price', document.getElementById('price').value);
    formData.append('level', document.getElementById('level').value);
    
    // Only append image if a new one was selected
    if (fileInput.files[0]) {
        formData.append('image', fileInput.files[0]);
    }

    try {
        // Switch between POST (/add) and PUT (/edit/:id)
        const method = editId ? 'PUT' : 'POST';
        const endpoint = editId ? `${API_URL}/edit/${editId}` : `${API_URL}/add`;

        const response = await fetch(endpoint, {
            method: method,
            headers: { 'Authorization': `Bearer ${token}` },
            body: formData 
        });

        const data = await response.json();

        if (response.ok) {
            alert(editId ? "✨ Book updated successfully!" : "✨ Book added successfully!");
            window.location.href = "manage_books.html";
        } else {
            alert("Error: " + (data.error || "Action failed"));
        }
    } catch (err) {
        console.error("Network Error:", err);
        alert("Server connection failed.");
    } finally {
        btn.disabled = false;
        spinner.classList.add('d-none');
        btnText.innerText = editId ? "Update Book Details" : "Upload Book to Library";
    }
});

function logout() {
    localStorage.clear();
    window.location.href = "../login.html";
}
</script>

</body>
</html>
