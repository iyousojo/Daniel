<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>Add Book | ADR Admin</title>
    <style>
        .form-container { max-width: 600px; margin: 30px auto; padding: 30px; border-radius: 15px; }
        #imagePreview { max-height: 200px; display: none; margin-top: 10px; border-radius: 8px; border: 2px dashed #ddd; }
    </style>
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg bg-white sticky-top shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-primary" href="#">Academic Digital Resources</a>
            <div class="d-flex align-items-center">
                <button class="btn btn-sm btn-outline-danger" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="form-container bg-white shadow-sm border">
            <h2 class="mb-4 text-center fw-bolder text-primary"><i class="bi bi-journal-plus"></i> Add New Book</h2>
            
            <form id="addBookForm">
                <div class="mb-3">
                    <label for="title" class="form-label fw-bold">Book Title</label>
                    <input type="text" class="form-control" id="title" required>
                </div>
                
                <div class="mb-3">
                    <label for="author" class="form-label fw-bold">Author</label>
                    <input type="text" class="form-control" id="author" required>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="price" class="form-label fw-bold">Price (₦)</label>
                        <input type="number" class="form-control" id="price" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="level" class="form-label fw-bold">Level</label>
                        <select class="form-select" id="level" required>
                            <option value="100L">100L</option>
                            <option value="200L">200L</option>
                            <option value="300L">300L</option>
                            <option value="400L">400L</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="image" class="form-label fw-bold">Cover Image</label>
                    <input type="file" class="form-control" id="image" accept="image/*" required onchange="previewFile()">
                    <div class="text-center">
                        <img src="" id="imagePreview" alt="Preview" class="img-fluid mx-auto mt-2">
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn btn-primary w-100 fw-bold py-2">
                    <span id="btnText">Upload Book to Library</span>
                    <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                </button>
            </form>
        </div>
    </div>
<script>
    const API_URL = "https://bookshop-api-jbl4.onrender.com/api";

    // FIX FOR PREVIEW ERROR
    function previewFile() {
        const preview = document.getElementById('imagePreview');
        const fileInput = document.getElementById('image');
        
        // FIX 1: Add here
        const selectedFile = fileInput.files[0]; 

        if (selectedFile) {
            const reader = new FileReader();

            reader.onloadend = () => {
                preview.src = reader.result;
                preview.style.display = 'block';
            }
            
            // This now receives the 'Blob' it was asking for
            reader.readAsDataURL(selectedFile); 
        }
    }

    // FIX FOR BACKEND ERROR
    document.getElementById('addBookForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const token = localStorage.getItem('token');
        const btn = document.getElementById('submitBtn');
        const spinner = document.getElementById('btnSpinner');
        const btnText = document.getElementById('btnText');
        const fileInput = document.getElementById('image');

        if (fileInput.files.length === 0) {
            alert("Please select an image file.");
            return;
        }

        btn.disabled = true;
        spinner.classList.remove('d-none');
        btnText.innerText = "Uploading...";

        const formData = new FormData();
        formData.append('title', document.getElementById('title').value);
        formData.append('author', document.getElementById('author').value);
        formData.append('price', document.getElementById('price').value);
        formData.append('level', document.getElementById('level').value);
        
        // FIX 2: Add here as well
        formData.append('image', fileInput.files[0]); 

        try {
            const response = await fetch(`${API_URL}/books`, {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${token}` 
                },
                body: formData 
            });

            const data = await response.json();

            if (response.ok) {
                alert("✨ Success! Book uploaded to Cloudinary.");
                window.location.href = "dashboard.html";
            } else {
                console.error("Server Error:", data);
                alert("Error: " + (data.error || "Upload failed"));
            }
        } catch (err) {
            console.error("Network Error:", err);
        } finally {
            btn.disabled = false;
            spinner.classList.add('d-none');
            btnText.innerText = "Upload Book to Library";
        }
    });

    function logout() {
        localStorage.clear();
        window.location.href = "../login.html";
    }
</script>

</body>
</html>
