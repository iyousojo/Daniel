<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>Admin Dashboard | ADR</title>
    <style>
        table { border-collapse: collapse; width: 100%; }
        th, td { text-align: left; padding: 12px; border-bottom: 2px solid #ddd; }
        tr:hover { background-color: #f5f5f5; }
        th { background-color: #0d6efd; color: white; }
        .dashboard { padding: 20px; border-radius: 8px; margin-bottom: 50px; }
        .stats-card { border: none; border-left: 5px solid #0d6efd; transition: 0.3s; }
        .stats-card:hover { transform: translateY(-5px); }
        .nav-link.active { font-weight: bold; color: #0d6efd !important; }
        
        /* Dropdown Custom Styling */
        .dropdown-menu { border-radius: 10px; margin-top: 10px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .dropdown-item { padding: 10px 20px; transition: 0.2s; }
        .dropdown-item:hover { background-color: #f8f9fa; color: #0d6efd; padding-left: 25px; }
    </style>
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg bg-white sticky-top shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-primary" href="#">Academic Digital Resources</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="adminNavbar">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" href="dashboard.html"><i class="bi bi-speedometer2"></i> Home</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="bookDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-book"></i> Books
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="bookDropdown">
                            <li>
                                <a class="dropdown-item" href="form_book.html">
                                    <i class="bi bi-plus-circle me-2 text-primary"></i> Add New Book
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-item" href="manage_books.html">
                                    <i class="bi bi-pencil-square me-2 text-success"></i> Manage Inventory
                                </a>
                            </li>
                        </ul>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <span id="adminName" class="me-3 text-muted fw-bold">Admin Panel</span>
                    <button class="btn btn-sm btn-outline-danger" onclick="logout()">
                        <i class="bi bi-box-arrow-right"></i> Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col-md-4 mb-3">
                <div class="card stats-card shadow-sm p-3">
                    <small class="text-muted fw-bold">TOTAL REGISTERED STUDENTS</small>
                    <h3 id="totalStudents" class="fw-bold">0</h3>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card stats-card shadow-sm p-3" style="border-left-color: #198754;">
                    <small class="text-muted fw-bold">TOTAL REVENUE</small>
                    <h3 id="totalSales" class="fw-bold">₦0</h3>
                </div>
            </div>
        </div>

        <div class="dashboard bg-white shadow-sm">
            <h2 class="mb-4 text-center fw-bolder text-primary">Student Purchase Records</h2>
            
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th scope="col">#</th>
                            <th scope="col">Full Name</th>
                            <th scope="col">Matric No</th>
                            <th scope="col">Level</th>
                            <th scope="col">Books Bought</th>
                            <th scope="col">Action</th>
                        </tr>
                    </thead>
                    <tbody id="recordsBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="booksModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="booksModalLabel">Purchased Books</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <ul class="list-group list-group-flush" id="purchasedBooksList"></ul>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    const API_URL = "https://bookshop-api-jbl4.onrender.com/api";
    let groupedData = {};

    document.addEventListener('DOMContentLoaded', fetchDashboardData);

    async function fetchDashboardData() {
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user'));

        if (!token || !user || user.role !== 'admin') {
            window.location.href = "../login&signup.html"; 
            return;
        }

        try {
            const response = await fetch(`${API_URL}/admin/dashboard-stats`, {
                method: 'GET',
                headers: { 
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });
            
            if (!response.ok) throw new Error("Auth failed or Server error");

            const payments = await response.json();
            
            if (!Array.isArray(payments)) return;

            groupedData = payments.reduce((acc, curr) => {
                if (!curr.user || !curr.book) return acc;
                const studentKey = curr.user._id; 
                
                if (!acc[studentKey]) {
                    acc[studentKey] = {
                        user: curr.user,
                        books: [],
                        totalSpent: 0
                    };
                }
                acc[studentKey].books.push(curr.book);
                acc[studentKey].totalSpent += (curr.amount || curr.book.price || 0);
                return acc;
            }, {});

            renderTable();
            updateStats(payments);

        } catch (err) {
            console.error("Dashboard Error:", err);
            document.getElementById('recordsBody').innerHTML = `<tr><td colspan="6" class="text-center text-danger">Error: ${err.message}</td></tr>`;
        }
    }

    function renderTable() {
        const tableBody = document.getElementById('recordsBody');
        tableBody.innerHTML = '';
        
        const students = Object.keys(groupedData);
        
        if (students.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="6" class="text-center">No successful payments found.</td></tr>`;
            return;
        }

        students.forEach((id, index) => {
            const item = groupedData[id];
            tableBody.innerHTML += `
                <tr>
                    <td>${index + 1}</td>
                    <td class="fw-bold">${item.user.fullname || 'Unknown'}</td>
                    <td>${item.user.matricNo || 'N/A'}</td>
                    <td>${item.user.level ? item.user.level + 'L' : 'N/A'}</td>
                    <td><span class="badge bg-primary rounded-pill">${item.books.length} Books</span></td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary" onclick="viewDetails('${id}')">
                            <i class="bi bi-eye"></i> View History
                        </button>
                    </td>
                </tr>
            `;
        });
    }

    function viewDetails(studentKey) {
        const student = groupedData[studentKey];
        if (!student) return;

        document.getElementById('booksModalLabel').innerText = `History: ${student.user.fullname}`;
        const list = document.getElementById('purchasedBooksList');
        
        list.innerHTML = student.books.map(book => `
            <li class="list-group-item d-flex justify-content-between align-items-center">
                <div>
                    <div class="fw-bold">${book.title}</div>
                </div>
                <span class="badge bg-success">₦${Number(book.price).toLocaleString()}</span>
            </li>
        `).join('');
        
        const myModal = new bootstrap.Modal(document.getElementById('booksModal'));
        myModal.show();
    }

    function updateStats(payments) {
        document.getElementById('totalStudents').innerText = Object.keys(groupedData).length;
        const total = payments.reduce((sum, p) => sum + (p.amount || 0), 0);
        document.getElementById('totalSales').innerText = `₦${total.toLocaleString()}`;
    }

    function logout() {
        localStorage.clear();
        window.location.href = "../index.html";
    }
</script>
</body>
</html>
